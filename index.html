<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iron Crotch Trainer</title>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 900px; margin: 0 auto; padding: 20px; background: #12121a; color: #eee; }
        h1 { text-align: center; color: #ff4757; font-size: 2em; }
        .warning { background: #3a2a2a; padding: 18px; border-radius: 12px; border-left: 6px solid #ff4757; margin: 20px 0; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .card { background: #1f1f2e; border-radius: 16px; overflow: hidden; box-shadow: 0 6px 16px rgba(0,0,0,0.5); }
        .card-header { background: linear-gradient(90deg, #ff4757, #ff9f1c); padding: 12px; text-align: center; font-weight: bold; }
        img { width: 100%; height: 200px; object-fit: cover; }
        .content { padding: 16px; }
        button { background: #ff4757; color: white; border: none; padding: 14px 28px; border-radius: 12px; font-size: 1.1em; margin: 10px 0; width: 100%; }
    </style>
</head>
<body>
    <h1>🛡️ Iron Crotch Trainer</h1>
    <p style="text-align:center;">Sichere, schrittweise Ausbildung für Anfänger</p>

    <div class="warning">
        <strong>WICHTIG FÜR ANFÄNGER:</strong> Konsultiere immer einen Arzt. Starte extrem sanft. Bei Schmerzen sofort stoppen. Fortschritt dauert Monate, nicht Tage.
    </div>

    <div class="grid" id="cards"></div>

    <script>
        const phases = [
            {
                title: "Phase 1: Vorbereitung",
                desc: "10 Min. Tiefe Bauchatmung + sanfte Massagen vom Solarplexus abwärts. Wärme in den Unterleib leiten.",
                imgPrompt: "Anatomische Illustration: Mann in entspannter Haltung, Hände auf Bauch, rote Energiefluss-Linien zum Beckenboden, clean minimalist style",
                level: "Anfänger"
            },
            {
                title: "Phase 2: Massage & Manipulation",
                desc: "Sanftes Rollen der Samenstränge und Kreisen der Hoden mit Daumen & Zeigefinger. Sehr leichter Druck.",
                imgPrompt: "Minimalistische anatomische Zeichnung: Hände führen sanfte Massage am Beckenbereich durch, blaue Energie-Linien, no real people",
                level: "Anfänger"
            },
            {
                title: "Phase 3: Leichtes Hängen",
                desc: "Weiches Tuch oder Seil verwenden. Leichtes Gewicht langsam anheben und schwingen. Knie beugen.",
                imgPrompt: "Illustration: Silhouette mit weichem Tuch und kleinem Gewicht am Unterleib, kontrollierte Haltung",
                level: "Fortgeschritten"
            }
        ];

        function createCards() {
            const grid = document.getElementById('cards');
            grid.innerHTML = phases.map(phase => `
                <div class="card">
                    <div class="card-header">\( {phase.title} <small>( \){phase.level})</small></div>
                    <img src="https://via.placeholder.com/600x300/1f1f2e/ffffff?text=\( {encodeURIComponent(phase.title)}" alt=" \){phase.title}">
                    <div class="content">
                        <p>${phase.desc}</p>
                        <button onclick="startExercise('${phase.title}')">Starten</button>
                    </div>
                </div>
            `).join('');
        }

        function startExercise(name) {
            alert(`🚀 ${name} gestartet!\n\nAtme tief in den Unterbauch. Gehe langsam vor. Timer starten?`);
            // Add timer logic here if desired
        }

        createCards();
    </script>
</body>
</html>
